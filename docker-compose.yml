services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  api:
    build: .
    entrypoint: ["npx", "tsx", "src/server.ts"]
    ports:
      - "3000:3000"
    depends_on:
      - redis
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - JOBS_DIR=/app/jobs
    volumes:
      - jobs-data:/app/jobs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build: .
    entrypoint: ["npx", "tsx", "src/worker.ts"]
    depends_on:
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
        required: false
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - JOBS_DIR=/app/jobs
      - OLLAMA_BASE_URL=http://ollama:11434
    shm_size: "2gb"
    volumes:
      - jobs-data:/app/jobs
      - ./output:/output
      - openreels-cache:/root/.openreels/cache
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: [local]
    volumes:
      - ollama-models:/root/.ollama
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma4:e4b}
    entrypoint: ["/bin/sh", "-c", "ollama serve & until curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; do sleep 1; done && ollama pull $${OLLAMA_MODEL:-gemma4:e4b} && wait"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

volumes:
  jobs-data:
  openreels-cache:
  ollama-models:
